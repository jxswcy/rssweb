<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RSS Web{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main { flex: 1; }
    nav {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a { color: #fff; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
    nav .nav-links a { margin-left: 1.5rem; font-weight: 400; font-size: 0.95rem; opacity: 0.9; }
    nav .nav-links a:hover { opacity: 1; }
    main { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; width: 100%; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.42rem 1rem; border-radius: 8px;
      font-size: 0.88rem; font-weight: 500; cursor: pointer; border: none;
      text-decoration: none; transition: opacity 0.15s; text-align: center;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.82; }
    .btn-primary { background: #6e56cf; color: #fff; }
    .btn-secondary { background: #e8e8ed; color: #3a3a3c; }
    .btn-rss      { background: #0A84FF; color: #fff; }
    .btn-refresh  { background: #FF9F0A; color: #fff; }
    .btn-retranslate { background: #30D158; color: #fff; }
    .btn-danger   { background: #FF453A; color: #fff; }
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden; margin-bottom: 1.2rem;
    }
    .card-top-bar { height: 4px; }
    .card-body { padding: 1.2rem 1.4rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.4rem; color: #3a3a3c; }
    input[type=text], input[type=url], input[type=number], input[type=password], select {
      width: 100%; padding: 0.55rem 0.8rem; border: 1px solid #d2d2d7;
      border-radius: 8px; font-size: 0.95rem; background: #fff;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { outline: none; border-color: #667eea; }
    .toggle-row { display: flex; align-items: center; gap: 0.8rem; }
    .hint { font-size: 0.8rem; color: #86868b; margin-top: 0.3rem; line-height: 1.6; }
    .hint code { background: #e5e5ea; padding: 0.1rem 0.3rem; border-radius: 3px; font-family: monospace; color: #3a3a3c; }
    .alert { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    .alert-success { background: #d1fae5; color: #065f46; }
    .alert-error { background: #fee2e2; color: #991b1b; }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/">RSS Web</a>
    <div class="nav-links">
      <a href="/">订阅管理</a>
      <a href="/settings">AI设置</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer style="text-align:center;padding:1rem 1rem 1.4rem;font-size:0.76rem;color:#aeaeb2;border-top:1px solid #e5e5ea;background:#f5f5f7;">
    <span style="color:#c7c7cc;">v1.0</span>
    &nbsp;·&nbsp;
    Built by <a href="https://github.com/jxswcy" style="color:#0A84FF;text-decoration:none;font-weight:500;" target="_blank">jxswcy</a>
    &nbsp;·&nbsp;
    Powered by <span style="color:#a78bfa;font-weight:500;">Claude Sonnet 4.6</span>
  </footer>
</body>
</html>
