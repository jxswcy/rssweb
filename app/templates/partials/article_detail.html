<div id="article-data"
  data-title="{{ (article.title_translated or article.title) | e }}"
  data-source="{{ article.feed.name }}"
  data-url="{{ article.url }}"
  data-id="{{ article.id }}"
  data-published="{% if article.published_at %}{{ article.published_at.strftime('%Y-%m-%d %H:%M') }}{% endif %}"
  style="display:none;"></div>

<div class="article-content">
  {% if bilingual_content %}
    {{ bilingual_content | safe }}
  {% elif article.content_translated %}
    {{ article.content_translated | safe }}
  {% elif article.content_original %}
    {{ article.content_original | safe }}
  {% else %}
    <p style="color:var(--stone);">暂无正文内容</p>
    <p><a href="{{ article.url }}" target="_blank">前往原文查看</a></p>
  {% endif %}
</div>
