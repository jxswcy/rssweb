{% extends "base.html" %}
{% block title %}设置 — RSS Web{% endblock %}

{% block content %}
<div style="max-width:520px;margin:0 auto;">
  <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.2rem;">设置</h1>

  {% if saved %}
  <div class="alert alert-success">设置已保存。</div>
  {% endif %}

  <form method="post" action="/settings">
    <div class="card">
      <div class="card-body">
        <div class="form-group">
          <label for="openai_api_key">
            OpenAI API Key
            {% if openai_key_set %}<span style="color:#34c759;font-size:0.8rem;">（已设置）</span>{% endif %}
          </label>
          <input type="password" id="openai_api_key" name="openai_api_key" placeholder="留空则不修改">
        </div>
        <div class="form-group">
          <label for="deepseek_api_key">
            DeepSeek API Key
            {% if deepseek_key_set %}<span style="color:#34c759;font-size:0.8rem;">（已设置）</span>{% endif %}
          </label>
          <input type="password" id="deepseek_api_key" name="deepseek_api_key" placeholder="留空则不修改">
        </div>
        <div class="form-group">
          <label for="openrouter_api_key">
            OpenRouter API Key
            {% if openrouter_key_set %}<span style="color:#34c759;font-size:0.8rem;">（已设置）</span>{% endif %}
          </label>
          <input type="password" id="openrouter_api_key" name="openrouter_api_key" placeholder="留空则不修改">
        </div>
        <div class="form-group">
          <label for="claude_api_key">
            Claude API Key
            {% if claude_key_set %}<span style="color:#34c759;font-size:0.8rem;">（已设置）</span>{% endif %}
          </label>
          <input type="password" id="claude_api_key" name="claude_api_key" placeholder="留空则不修改">
        </div>
        <div class="form-group">
          <label for="translate_target_lang">翻译目标语言</label>
          <select id="translate_target_lang" name="translate_target_lang">
            <option value="zh-CN" {% if translate_target_lang == 'zh-CN' %}selected{% endif %}>简体中文</option>
            <option value="zh-TW" {% if translate_target_lang == 'zh-TW' %}selected{% endif %}>繁體中文</option>
            <option value="ja" {% if translate_target_lang == 'ja' %}selected{% endif %}>日本語</option>
            <option value="en" {% if translate_target_lang == 'en' %}selected{% endif %}>English</option>
          </select>
        </div>
      </div>
    </div>
    <div style="margin-top:1rem;">
      <button type="submit" class="btn btn-primary">保存设置</button>
    </div>
  </form>
</div>
{% endblock %}
